<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--blue:#1F5BFF;--navy:#0B1B3A;--white:#FAFAFA;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .cover{
    width:1080px;height:1080px;
    background:radial-gradient(circle at 50% 38%, #16356e 0%, #0B1B3A 68%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:60px;
    position:relative;overflow:hidden;
  }
  .cover::after{content:"";position:absolute;top:-120px;left:50%;transform:translateX(-50%);
    width:560px;height:560px;border-radius:50%;
    background:radial-gradient(circle,rgba(31,91,255,0.35),transparent 65%);filter:blur(40px);}
  /* círculo-guia sutil (a área visível do destaque) */
  .cover::before{
    content:"";position:absolute;top:50%;left:50%;
    width:760px;height:760px;border:2px solid rgba(255,255,255,0.07);
    border-radius:50%;transform:translate(-50%,-50%);
  }
  .cover::before,.cover::after{z-index:0;}
  .icon,.label{position:relative;z-index:1;}
  .icon{width:300px;height:300px;display:flex;align-items:center;justify-content:center;}
  .icon svg{width:100%;height:100%;}
  .label{font-size:54px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--white);z-index:1;}
  .label b{color:var(--blue);}
  /* estilo comum dos traços */
  .st{fill:none;stroke:#FAFAFA;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;}
  .acc{fill:none;stroke:#1F5BFF;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;}
  .fillacc{fill:#1F5BFF;}
</style>
</head>
<body>

<!-- SOBRE -->
<div class="cover" id="sobre">
  <div class="icon"><svg viewBox="0 0 100 100">
    <circle class="st" cx="50" cy="36" r="18"/>
    <path class="st" d="M20 82c0-17 13-26 30-26s30 9 30 26"/>
    <circle class="fillacc" cx="50" cy="36" r="4"/>
  </svg></div>
  <div class="label">Sobre</div>
</div>

<!-- SERVIÇOS -->
<div class="cover" id="servicos">
  <div class="icon"><svg viewBox="0 0 100 100">
    <rect class="st" x="18" y="18" width="28" height="28" rx="6"/>
    <rect class="acc" x="54" y="18" width="28" height="28" rx="6"/>
    <rect class="acc" x="18" y="54" width="28" height="28" rx="6"/>
    <rect class="st" x="54" y="54" width="28" height="28" rx="6"/>
  </svg></div>
  <div class="label">Serviços</div>
</div>

<!-- AUTOMAÇÃO -->
<div class="cover" id="automacao">
  <div class="icon"><svg viewBox="0 0 100 100">
    <rect class="st" x="28" y="34" width="44" height="38" rx="10"/>
    <line class="st" x1="50" y1="22" x2="50" y2="34"/>
    <circle class="fillacc" cx="50" cy="20" r="5"/>
    <circle class="acc" cx="41" cy="51" r="5"/>
    <circle class="acc" cx="59" cy="51" r="5"/>
    <line class="st" x1="40" y1="64" x2="60" y2="64"/>
    <line class="st" x1="20" y1="48" x2="28" y2="48"/>
    <line class="st" x1="72" y1="48" x2="80" y2="48"/>
  </svg></div>
  <div class="label">Automação</div>
</div>

<!-- SITES -->
<div class="cover" id="sites">
  <div class="icon"><svg viewBox="0 0 100 100">
    <rect class="st" x="18" y="24" width="64" height="44" rx="6"/>
    <line class="acc" x1="18" y1="36" x2="82" y2="36"/>
    <circle class="fillacc" cx="27" cy="30" r="2.5"/>
    <circle class="fillacc" cx="35" cy="30" r="2.5"/>
    <line class="st" x1="40" y1="80" x2="60" y2="80"/>
    <line class="st" x1="50" y1="68" x2="50" y2="80"/>
  </svg></div>
  <div class="label">Sites</div>
</div>

<!-- POSTS -->
<div class="cover" id="posts">
  <div class="icon"><svg viewBox="0 0 100 100">
    <rect class="st" x="22" y="22" width="56" height="56" rx="14"/>
    <circle class="fillacc" cx="39" cy="40" r="6"/>
    <path class="acc" d="M27 71l17-17 9 9 9-9 11 11"/>
  </svg></div>
  <div class="label">Posts</div>
</div>

<!-- BRANDING -->
<div class="cover" id="branding">
  <div class="icon"><svg viewBox="0 0 100 100">
    <path class="fillacc" d="M48 16l8 22 22 8-22 8-8 22-8-22-22-8 22-8z"/>
    <path class="st" d="M78 60l3.5 9.5L91 73l-9.5 3.5L78 86l-3.5-9.5L65 73l9.5-3.5z"/>
  </svg></div>
  <div class="label">Branding</div>
</div>

<!-- CONTATO -->
<div class="cover" id="contato">
  <div class="icon"><svg viewBox="0 0 100 100">
    <path class="st" d="M82 26L20 48l24 8 6 22 10-18 22-34z"/>
    <line class="acc" x1="82" y1="26" x2="44" y2="56"/>
  </svg></div>
  <div class="label">Contato</div>
</div>

</body>
</html>
